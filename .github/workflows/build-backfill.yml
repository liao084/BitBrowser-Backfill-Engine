name: Build Backfill EXE

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "backfill_engine.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-backfill.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Check Python syntax
        run: uv run python -m py_compile backfill_engine.py

      - name: Build Windows EXE
        run: >
          uv run pyinstaller
          --clean
          --onefile
          --name backfill_engine
          backfill_engine.py

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: backfill-engine-windows
          path: dist/backfill_engine.exe
          if-no-files-found: error
          retention-days: 30
